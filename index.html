<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GymRec 健身筆記</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .safe-bottom {
            padding-bottom: calc(env(safe-area-inset-bottom) + 4rem);
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-900 font-sans antialiased pb-20">

    <div class="bg-blue-600 text-white pt-12 pb-4 px-4 sticky top-0 z-50 shadow-md flex justify-between items-center">
        <h1 class="text-xl font-black tracking-wide" id="page-title">🏋️ GymRec 開始訓練</h1>
        <button id="global-add-btn" class="text-white focus:outline-none" onclick="openAddModal()">
            <i data-lucide="plus-circle" class="w-7 h-7"></i>
        </button>
    </div>

    <main class="p-4 safe-bottom">
        <div id="tab-workout" class="tab-content">
            <div id="category-list" class="space-y-4">
                <div class="text-center py-12">
                    <div class="animate-spin inline-block w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full mb-4"></div>
                    <p class="text-sm text-gray-400">正在智慧初始化安全健身資料庫...</p>
                </div>
            </div>
        </div>

        <div id="tab-history" class="tab-content hidden">
            <div class="bg-white p-4 rounded-2xl shadow-sm mb-4">
                <h3 class="font-bold text-sm text-gray-500 mb-2">📅 歷史訓練紀錄清單</h3>
                <div id="history-logs-container" class="space-y-3">
                    </div>
            </div>
        </div>

        <div id="tab-settings" class="tab-content hidden">
            <div class="bg-white p-4 rounded-2xl shadow-sm space-y-4">
                
                <div class="border-b pb-4">
                    <p class="font-bold text-blue-600 flex items-center gap-1">
                        <i data-lucide="refresh-cw" class="w-4 h-4"></i>從舊版 iOS App 遷移數據
                    </p>
                    <p class="text-xs text-gray-400 mt-1 mb-3">選擇你在 iPhone App 導出的 .gymrec 檔案，一鍵還原所有紀錄與影片</p>
                    <button id="migration-action-btn" onclick="triggerMigrationInput()" class="w-full bg-blue-50 text-blue-600 py-3 rounded-xl text-sm font-bold border border-blue-200 active:bg-blue-100 disabled:opacity-50">
                        選擇 .gymrec 備份檔案導入
                    </button>
                    <input type="file" id="migration-file-input" accept=".gymrec" class="hidden" onchange="handleIOSMigration(event)">
                    <div id="migration-progress" class="hidden text-center pt-3">
                        <div class="animate-spin inline-block w-5 h-5 border-2 border-blue-500 border-t-transparent rounded-full mr-2 vertical-middle"></div>
                        <span class="text-xs text-blue-600 font-bold" id="migration-progress-text">正在深度解碼大量媒體與影片檔案...</span>
                    </div>
                </div>

                <div class="flex justify-between items-center border-b pb-2">
                    <div>
                        <p class="font-bold">本地數據清除</p>
                        <p class="text-xs text-gray-400">重置 App 到初始狀態</p>
                    </div>
                    <button onclick="resetDatabase()" class="bg-red-100 text-red-600 px-4 py-2 rounded-xl text-sm font-bold">清除重置</button>
                </div>
                <div class="text-xs text-gray-400 text-center pt-4">
                    GymRec Web PWA v1.4.0 · 高相容大文件遷移版
                </div>
            </div>
        </div>
    </main>

    <div id="detail-page" class="fixed inset-0 bg-gray-50 z-50 transform translate-x-full transition-transform duration-300 overflow-y-auto hidden">
        </div>

    <div id="record-modal" class="fixed inset-0 bg-black/50 z-50 flex items-end justify-center hidden">
        <div class="bg-white w-full max-w-md rounded-t-3xl p-6 space-y-4 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center">
                <h3 class="text-lg font-black" id="modal-title">填寫訓練紀錄</h3>
                <button onclick="closeRecordModal()" class="text-gray-400"><i data-lucide="x" class="w-6 h-6"></i></button>
            </div>
            <div class="space-y-2">
                <label class="text-xs font-bold text-gray-400">訓練日期</label>
                <input type="date" id="record-date" class="w-full bg-gray-100 p-3 rounded-xl border-0 focus:ring-2 focus:ring-blue-500">
            </div>
            <div class="space-y-2">
                <label class="text-xs font-bold text-gray-400">動作影片 (本地儲存)</label>
                <input type="file" id="record-video-input" accept="video/*" class="w-full text-sm text-gray-500">
            </div>
            <div class="space-y-3">
                <div class="flex justify-between items-center">
                    <label class="text-xs font-bold text-gray-400">組數紀錄 (點擊重量切換 N/A)</label>
                    <button onclick="addNewSetRow()" class="text-blue-600 text-xs font-bold flex items-center gap-1">
                        <i data-lucide="plus" class="w-3 h-3"></i>新增一組
                    </button>
                </div>
                <div id="sets-input-container" class="space-y-2">
                    </div>
            </div>
            <button onclick="saveRecordFromModal()" class="w-full bg-green-500 text-white py-4 rounded-xl font-bold shadow-lg shadow-green-200">儲存紀錄</button>
        </div>
    </div>

    <div id="add-item-modal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white w-full max-w-sm rounded-2xl p-6 space-y-4">
            <h3 class="text-lg font-black">新增訓練項目</h3>
            <input type="text" id="new-item-name" placeholder="輸入動作名稱 (如：槓鈴臥推)" class="w-full bg-gray-100 p-3 rounded-xl">
            <select id="new-item-cat" class="w-full bg-gray-100 p-3 rounded-xl">
                </select>
            <div class="flex gap-2">
                <button onclick="closeAddModal()" class="w-1/2 bg-gray-200 py-3 rounded-xl font-bold">取消</button>
                <button onclick="submitNewItem()" class="w-1/2 bg-blue-600 text-white py-3 rounded-xl font-bold">新增</button>
            </div>
        </div>
    </div>

    <div id="video-player-overlay" class="fixed inset-0 bg-black z-50 flex items-center justify-center hidden" onclick="closeFullScreenVideo()">
        <button class="absolute top-12 left-6 text-white/80 z-50"><i data-lucide="x-circle" class="w-8 h-8"></i></button>
        <video id="global-video-player" controls class="w-full max-h-screen"></video>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t border-gray-200 flex justify-around py-2 shadow-lg z-40">
        <button onclick="switchTab('workout')" id="tab-btn-workout" class="flex flex-col items-center gap-0.5 text-blue-600">
            <i data-lucide="dumbbell" class="w-6 h-6"></i><span class="text-[10px] font-bold">開始訓練</span>
        </button>
        <button onclick="switchTab('history')" id="tab-btn-history" class="flex flex-col items-center gap-0.5 text-gray-400">
            <i data-lucide="calendar" class="w-6 h-6"></i><span class="text-[10px] font-bold">歷史總覽</span>
        </button>
        <button onclick="switchTab('settings')" id="tab-btn-settings" class="flex flex-col items-center gap-0.5 text-gray-400">
            <i data-lucide="settings" class="w-6 h-6"></i><span class="text-[10px] font-bold">系統設定</span>
        </button>
    </nav>

    <script>
        let db = null;
        let useLocalStorageFallback = false;
        let isAppInitialized = false;
        let state = { workoutItems: [], historyRecords: [], categories: [], expandedGroups: new Set(), currentDetailItem: null };

        function safeRefreshIcons() {
            if (window.lucide && typeof window.lucide.createIcons === 'function') {
                window.lucide.createIcons();
            }
        }

        let dbWatchdogTimer = setTimeout(() => {
            if (!isAppInitialized) {
                activateFallbackMode("iOS 系統資料庫無回應，已自動切換至安全防卡死相容模式");
            }
        }, 1200);

        // --- 1. 資料庫載入核心 ---
        try {
            const request = indexedDB.open("GymRecWebDB", 2);
            request.onupgradeneeded = function(e) {
                let dbInst = e.target.result;
                if(!dbInst.objectStoreNames.contains("workoutItems")) dbInst.createObjectStore("workoutItems", {keyPath: "id"});
                if(!dbInst.objectStoreNames.contains("historyRecords")) dbInst.createObjectStore("historyRecords", {keyPath: "id"});
                if(!dbInst.objectStoreNames.contains("categories")) dbInst.createObjectStore("categories", {autoIncrement: true});
                if(!dbInst.objectStoreNames.contains("videos")) dbInst.createObjectStore("videos", {keyPath: "id"});
            };
            request.onsuccess = function(e) {
                db = e.target.result;
                if (!isAppInitialized) {
                    clearTimeout(dbWatchdogTimer);
                    initData();
                }
            };
            request.onerror = function() {
                clearTimeout(dbWatchdogTimer);
                activateFallbackMode("資料庫開啟失敗，切換至相容模式");
            };
        } catch (err) {
            clearTimeout(dbWatchdogTimer);
            activateFallbackMode("瀏覽器限制，切換至安全相容模式");
        }

        function activateFallbackMode(reason) {
            if(isAppInitialized) return;
            console.warn(reason);
            useLocalStorageFallback = true;
            initData();
        }

        async function initData() {
            if(isAppInitialized) return;
            isAppInitialized = true;
            try {
                state.categories = await getAllFromStore("categories");
                if (state.categories.length === 0) {
                    state.categories = ["胸部 (Chest)", "背部 (Back)", "上肢 (Upper Limbs)", "下肢 (Lower Limbs)", "核心 (Core)"];
                    for(let cat of state.categories) { await addToStore("categories", cat); }
                }
                state.workoutItems = await getAllFromStore("workoutItems");
                if (state.workoutItems.length === 0) {
                    const defaultItems = [
                        { id: "1", name: "槓鈴臥推", category: "胸部 (Chest)" },
                        { id: "2", name: "單手啞鈴划船", category: "背部 (Back)" },
                        { id: "3", name: "棒式支撐", category: "核心 (Core)" }
                    ];
                    for(let item of defaultItems) { await saveToStore("workoutItems", item); }
                    state.workoutItems = defaultItems;
                }
                state.historyRecords = await getAllFromStore("historyRecords");
                renderCategoryList();
                renderGlobalHistory();
                safeRefreshIcons();
            } catch (err) {
                useLocalStorageFallback = true;
                isAppInitialized = false;
                initData();
            }
        }

        // --- 2. 💡 完美修復：iOS .gymrec 數據高相容性解碼引擎 ---
        function triggerMigrationInput() { document.getElementById("migration-file-input").click(); }

        function handleIOSMigration(event) {
            const file = event.target.files[0];
            if (!file) return;

            // UI 狀態切換為正在讀取打包
            document.getElementById("migration-action-btn").disabled = true;
            document.getElementById("migration-progress").classList.remove("hidden");

            const reader = new FileReader();
            reader.onload = async function(e) {
                try {
                    const backupPackage = JSON.parse(e.target.result);
                    
                    // 1. 還原肌群分類
                    if (backupPackage.categories && backupPackage.categories.length > 0) {
                        await clearStore("categories"); state.categories = backupPackage.categories;
                        for(let cat of state.categories) { await addToStore("categories", cat); }
                    }

                    // 2. 還原健身動作庫
                    state.workoutItems = backupPackage.workoutItems.map(item => ({
                        id: item.id || "item_" + Math.random(), name: item.name, category: item.category || "未分類"
                    }));
                    await clearStore("workoutItems");
                    for(let item of state.workoutItems) { await saveToStore("workoutItems", item); }

                    // 3. 完美修復：安全解碼大型影片檔案，絕不觸發記憶體死鎖
                    if (backupPackage.videos && backupPackage.videos.length > 0 && !useLocalStorageFallback) {
                        for(let vid of backupPackage.videos) {
                            try {
                                const blob = base64ToBlob(vid.videoData, 'video/mp4');
                                await saveToStore("videos", { id: vid.fileName, data: blob });
                            } catch(vErr) { console.error("個別影片解碼失敗，已安全跳過:", vErr); }
                        }
                    }

                    // 4. 完美修復：精準校對 iOS CoreData 時間差 (加回 978307200 秒)
                    state.historyRecords = (backupPackage.historyRecords || []).map(rec => {
                        let formattedDate = "";
                        if (typeof rec.date === "number") {
                            // Swift 預設的 JSONEncoder 會把 Date 編碼為自 2001 年起的秒數
                            // 將其加上 978307200 秒以轉換為網頁標準的 Unix Timestamp
                            const unixTimeMs = (rec.date + 978307200) * 1000;
                            formattedDate = new Date(unixTimeMs).toISOString().split('T')[0];
                        } else if (typeof rec.date === "string" && rec.date.includes("T")) {
                            formattedDate = rec.date.split('T')[0];
                        } else {
                            formattedDate = new Date().toISOString().split('T')[0];
                        }
                        
                        return {
                            id: rec.id || "rec_" + Math.random(),
                            date: formattedDate,
                            workoutName: rec.workoutName,
                            sets: (rec.sets || []).map(s => ({
                                setNumber: s.setNumber, weight: s.weight, reps: s.reps,
                                unit: s.unit || "kg", metricType: s.metricType || "reps", side: s.side || null
                            })),
                            videoId: rec.videoFileName || null
                        };
                    });

                    await clearStore("historyRecords");
                    for(let rec of state.historyRecords) { await saveToStore("historyRecords", rec); }

                    alert("🎉 數據與歷史影片已 100% 完整相容遷移！");
                    location.reload();
                } catch (err) {
                    console.error("遷移錯誤詳細資訊:", err);
                    alert("❌ 遷移失敗！精確錯誤原因：" + err.message + "\n\n請確保你選擇的是從 iOS App 導出的完整 .gymrec 檔案。");
                    document.getElementById("migration-action-btn").disabled = false;
                    document.getElementById("migration-progress").classList.add("hidden");
                }
            };
            reader.readAsText(file);
        }

        // 💡 記憶體優化版：大檔案 Base64 轉成 Blob 引擎 (專治 Safari 閃退)
        function base64ToBlob(base64Str, mimeType) {
            const cleanedStr = base64Str.replace(/\s/g, ''); // 清理所有潛在的空白換行
            const byteCharacters = atob(cleanedStr);
            const len = byteCharacters.length;
            const byteNumbers = new Uint8Array(len);
            for (let i = 0; i < len; i++) {
                byteNumbers[i] = byteCharacters.charCodeAt(i);
            }
            return new Blob([byteNumbers], {type: mimeType});
        }

        // --- 3. UI 渲染面板 ---
        function renderCategoryList() {
            const container = document.getElementById("category-list"); container.innerHTML = "";
            state.categories.forEach(cat => {
                const items = state.workoutItems.filter(i => i.category === cat); const isExpanded = state.expandedGroups.has(cat);
                let sectionHtml = `
                    <div class="bg-white rounded-2xl shadow-sm overflow-hidden border border-gray-100">
                        <div onclick="toggleGroup('${cat}')" class="p-4 flex justify-between items-center bg-white active:bg-gray-50 cursor-pointer">
                            <span class="font-extrabold text-base">${cat}</span>
                            <i data-lucide="${isExpanded ? 'chevron-down' : 'chevron-right'}" class="w-5 h-5 text-blue-500"></i>
                        </div>
                        <div class="${isExpanded ? '' : 'hidden'} border-t border-gray-50 bg-gray-50/50 p-2 space-y-1">
                `;
                if (items.length === 0) { sectionHtml += `<p class="text-xs text-gray-400 italic p-3 text-center">尚無項目，點擊右上角新增</p>`; } else {
                    items.forEach(item => {
                        sectionHtml += `
                            <div onclick="openDetailPage('${item.id}')" class="flex justify-between items-center p-3 bg-white rounded-xl border border-gray-100 active:bg-gray-50 mb-1 shadow-2xs">
                                <div class="flex items-center gap-2">
                                    <div class="w-2 h-2 rounded-full bg-blue-500"></div>
                                    <span class="text-sm font-bold text-gray-800">${item.name}</span>
                                </div>
                                <i data-lucide="chevron-right" class="w-4 h-4 text-gray-300"></i>
                            </div>
                        `;
                    });
                }
                sectionHtml += `</div></div>`; container.insertAdjacentHTML('beforeend', sectionHtml);
            });
            safeRefreshIcons();
        }

        function toggleGroup(cat) {
            if (state.expandedGroups.has(cat)) state.expandedGroups.delete(cat); else state.expandedGroups.add(cat);
            renderCategoryList();
        }

        // --- 4. 歷史進步圖表模組 ---
        let currentChartInstance = null;
        async function openDetailPage(itemId) {
            const item = state.workoutItems.find(i => i.id === itemId); state.currentDetailItem = item;
            const detailPage = document.getElementById("detail-page"); detailPage.classList.remove("hidden");
            setTimeout(() => detailPage.classList.remove("translate-x-full"), 10);
            const records = state.historyRecords.filter(r => r.workoutName === item.name).sort((a,b) => new Date(b.date) - new Date(a.date));
            let recordsHtml = "";
            records.forEach(rec => {
                let setsHtml = "";
                rec.sets.forEach(s => {
                    let sideStr = s.side === "L" ? `<span class="text-blue-500 text-xs font-black mr-1">[左]</span>` : (s.side === "R" ? `<span class="text-red-500 text-xs font-black mr-1">[右]</span>` : "");
                    let metricStr = s.metricType === "mins" ? "分鐘" : "下"; let weightStr = s.weight === null ? "N/A" : `${s.weight} ${s.unit}`;
                    setsHtml += `<p class="text-xs text-gray-500">第 ${s.setNumber} 組：${sideStr}${weightStr} × ${s.reps} ${metricStr}</p>`;
                });
                let videoBtn = (rec.videoId && !useLocalStorageFallback) ? `<button onclick="playVideo('${rec.videoId}', event)" class="mt-2 w-full bg-black text-white py-2 rounded-xl text-xs font-bold flex items-center justify-center gap-1"><i data-lucide="play" class="w-3 h-3"></i>播放動作紀錄影片</button>` : "";
                recordsHtml += `
                    <div class="bg-gray-50 p-3 rounded-xl border border-gray-100 relative">
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-xs font-black text-blue-600">${rec.date}</span>
                            <button onclick="deleteRecord('${rec.id}', event)" class="text-red-400 p-1"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </div>
                        ${setsHtml} ${videoBtn}
                    </div>
                `;
            });

            detailPage.innerHTML = `
                <div class="bg-blue-600 text-white pt-12 pb-4 px-4 sticky top-0 z-50 flex items-center gap-2 shadow-md">
                    <button onclick="closeDetailPage()"><i data-lucide="arrow-left" class="w-6 h-6"></i></button>
                    <h2 class="text-lg font-black">${item.name}</h2>
                </div>
                <div class="p-4 space-y-4 pb-24">
                    <button onclick="openRecordModal()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold shadow-md">+ 新增今日訓練紀錄</button>
                    <div class="bg-white p-4 rounded-2xl shadow-2xs">
                        <h4 class="text-xs font-black text-gray-400 mb-2 tracking-wider">📈 重量/時間進步曲線</h4>
                        <canvas id="detailChart" width="400" height="200"></canvas>
                    </div>
                    <div class="bg-white p-4 rounded-2xl shadow-2xs space-y-3">
                        <h4 class="text-xs font-black text-gray-400 tracking-wider">📅 歷史紀錄清單</h4>
                        <div class="space-y-2">${recordsHtml || '<p class="text-xs text-gray-400 italic text-center py-4">尚無訓練紀錄</p>'}</div>
                    </div>
                </div>
            `;
            safeRefreshIcons(); buildSmartChart(records);
        }

        function closeDetailPage() { const detailPage = document.getElementById("detail-page"); detailPage.classList.add("translate-x-full"); setTimeout(() => detailPage.classList.add("hidden"), 300); }

        function buildSmartChart(records) {
            if(currentChartInstance) currentChartInstance.destroy(); const ctx = document.getElementById('detailChart'); if(!ctx || records.length === 0 || !window.Chart) return;
            const chronological = [...records].reverse(); const latestSet = records[0].sets[0]; const isMins = latestSet.metricType === "mins"; const isNA = latestSet.weight === null;
            let yLabel = "重量 (kg)"; if(isMins) yLabel = "時間 (分)"; else if(isNA) yLabel = "次數 (下)";
            let dataL = [], dataR = [], dataBoth = [], labels = [];
            chronological.forEach(rec => {
                labels.push(rec.date); let grouped = {};
                rec.sets.forEach(s => {
                    let side = s.side || "Both"; let val = (isMins || isNA) ? s.reps : (s.weight || 0);
                    if(s.unit === "lbs" && !isMins && !isNA) val = val / 2.2046;
                    if(!grouped[side] || val > grouped[side]) grouped[side] = val;
                });
                dataL.push(grouped["L"] !== undefined ? grouped["L"] : null); dataR.push(grouped["R"] !== undefined ? grouped["R"] : null); dataBoth.push(grouped["Both"] !== undefined ? grouped["Both"] : null);
            });
            currentChartInstance = new Chart(ctx, {
                type: 'line', data: { labels: labels, datasets: [ { label: '左側 (L)', data: dataL, borderColor: '#3b82f6', tension: 0.3, spanGaps: true }, { label: '右側 (R)', data: dataR, borderColor: '#ef4444', tension: 0.3, spanGaps: true }, { label: '雙側/一般', data: dataBoth, borderColor: '#10b981', tension: 0.3, spanGaps: true } ] },
                options: { responsive: true, plugins: { legend: { display: true, labels: { boxWidth: 12 } } }, scales: { y: { title: { display: true, text: yLabel } } } }
            });
        }

        // --- 5. 組數表單控制單元 ---
        let modalSets = [];
        function openRecordModal() {
            document.getElementById("record-modal").classList.remove("hidden"); document.getElementById("record-date").value = new Date().toISOString().split('T')[0]; document.getElementById("record-video-input").value = "";
            modalSets = [{ setNumber: 1, weight: 10, reps: 10, unit: "kg", metricType: "reps", side: null }]; renderModalSetsRows();
        }
        function closeRecordModal() { document.getElementById("record-modal").classList.add("hidden"); }

        function renderModalSetsRows() {
            const container = document.getElementById("sets-input-container"); container.innerHTML = "";
            modalSets.forEach((set, index) => {
                let weightDisplay = set.weight === null ? "N/A" : `${set.weight}`; let isMins = set.metricType === "mins";
                let rowHtml = `
                    <div class="flex items-center gap-2 bg-gray-50 p-2 rounded-xl border border-gray-100">
                        <span class="text-xs font-black text-gray-400 w-6">#${set.setNumber}</span>
                        <button onclick="toggleSetSide(${index})" class="w-6 h-6 rounded-full text-[10px] font-black text-white flex items-center justify-center ${set.side==='L'?'bg-blue-500':set.side==='R'?'bg-red-500':'bg-gray-300'}">
                            ${set.side || '雙'}
                        </button>
                        <div class="flex items-center bg-white rounded-lg px-2 py-1 border flex-1 justify-between">
                            <span class="text-[10px] text-gray-400 mr-1">重量</span>
                            <span onclick="toggleWeightNA(${index})" class="font-mono font-bold text-sm text-blue-600 cursor-pointer px-2 bg-gray-100 rounded">${weightDisplay}</span>
                            ${set.weight !== null ? `<input type="number" step="0.25" value="${set.weight}" onchange="updateSetWeight(${index}, this.value)" class="w-12 text-right font-mono text-xs p-0 border-0 focus:ring-0">` : ''}
                            <button onclick="toggleSetUnit(${index})" class="text-[9px] font-black px-1.5 py-0.5 rounded text-white ${set.unit==='kg'?'bg-blue-500':'bg-orange-500'}">${set.unit.toUpperCase()}</button>
                        </div>
                        <div class="flex items-center bg-white rounded-lg px-2 py-1 border flex-1 justify-between">
                            <span class="text-[10px] text-gray-400 mr-1">${isMins?'時間':'次數'}</span>
                            <input type="number" value="${set.reps}" onchange="updateSetReps(${index}, this.value)" class="w-10 text-center font-bold text-sm p-0 border-0 focus:ring-0">
                            <span class="text-xs text-gray-400">${isMins?'分':'下'}</span>
                            <button onclick="toggleSetMetric(${index})" class="text-[9px] font-black px-1.5 py-0.5 rounded text-white ${isMins?'bg-purple-500':'bg-green-500'}">${isMins?'MIN':'REP'}</button>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', rowHtml);
            });
        }

        function addNewSetRow() {
            let last = modalSets[modalSets.length - 1] || { weight: 10, reps: 10, unit: "kg", metricType: "reps", side: null };
            modalSets.push({ setNumber: modalSets.length + 1, weight: last.weight, reps: last.reps, unit: last.unit, metricType: last.metricType, side: last.side });
            renderModalSetsRows();
        }

        function toggleSetSide(index) { if(!modalSets[index].side) modalSets[index].side = "L"; else if(modalSets[index].side === "L") modalSets[index].side = "R"; else modalSets[index].side = null; renderModalSetsRows(); }
        function toggleWeightNA(index) { modalSets[index].weight = modalSets[index].weight === null ? 10 : null; renderModalSetsRows(); }
        function updateSetWeight(index, val) { modalSets[index].weight = parseFloat(val) || 0; }
        function updateSetReps(index, val) { modalSets[index].reps = parseInt(val) || 0; }
        function toggleSetUnit(index) { modalSets[index].unit = modalSets[index].unit === "kg" ? "lbs" : "kg"; renderModalSetsRows(); }
        function toggleSetMetric(index) { modalSets[index].metricType = modalSets[index].metricType === "mins" ? "reps" : "mins"; renderModalSetsRows(); }

        async function saveRecordFromModal() {
            const date = document.getElementById("record-date").value; const videoFile = document.getElementById("record-video-input").files[0]; let videoId = null;
            if (videoFile && !useLocalStorageFallback) { videoId = "vid_" + Date.now(); await saveToStore("videos", { id: videoId, data: videoFile }); }
            const newRecord = { id: "rec_" + Date.now(), date: date, workoutName: state.currentDetailItem.name, sets: modalSets, videoId: videoId };
            await saveToStore("historyRecords", newRecord); state.historyRecords.unshift(newRecord);
            closeRecordModal(); openDetailPage(state.currentDetailItem.id); renderGlobalHistory();
        }

        // --- 6. 影片播放 ---
        async function playVideo(vidId, e) {
            e.stopPropagation(); let vidObj = await getFromStore("videos", vidId);
            if(vidObj) {
                const overlay = document.getElementById("video-player-overlay"); const player = document.getElementById("global-video-player");
                player.src = URL.createObjectURL(vidObj.data); overlay.classList.remove("hidden"); player.play();
            } else { alert("未找到影片檔案"); }
        }
        function closeFullScreenVideo() { document.getElementById("video-player-overlay").classList.add("hidden"); document.getElementById("global-video-player").pause(); }

        // --- 7. 全域邏輯 ---
        function renderGlobalHistory() {
            const container = document.getElementById("history-logs-container"); container.innerHTML = "";
            const sorted = [...state.historyRecords].sort((a,b) => new Date(b.date) - new Date(a.date));
            if(sorted.length === 0) { container.innerHTML = `<p class="text-xs text-gray-400 italic text-center py-6">目前沒有任何訓練紀錄</p>`; return; }
            sorted.forEach(rec => {
                let txt = ""; rec.sets.forEach(s => { let w = s.weight === null ? "N/A" : `${s.weight} ${s.unit}`; txt += `[#${s.setNumber} ${s.side||'雙'}] ${w} × ${s.reps}${s.metricType==='mins'?'分':'下'} | `; });
                let html = `
                    <div class="bg-gray-50 p-3 rounded-xl border border-gray-100 text-xs shadow-2xs">
                        <div class="flex justify-between items-center mb-1">
                            <span class="font-black text-gray-800">${rec.workoutName}</span> <span class="text-gray-400">${rec.date}</span>
                        </div>
                        <p class="text-gray-500 font-mono">${txt}</p>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', html);
            });
        }

        async function deleteRecord(recId, e) {
            e.stopPropagation(); if(!confirm("確定要刪除此筆紀錄嗎？")) return;
            const rec = state.historyRecords.find(r => r.id === recId);
            if(rec && rec.videoId && !useLocalStorageFallback) await deleteFromStore("videos", rec.videoId);
            await deleteFromStore("historyRecords", recId); state.historyRecords = state.historyRecords.filter(r => r.id !== recId);
            openDetailPage(state.currentDetailItem.id); renderGlobalHistory();
        }

        function openAddModal() { document.getElementById("add-item-modal").classList.remove("hidden"); document.getElementById("new-item-cat").innerHTML = state.categories.map(c => `<option value="${c}">${c}</option>`).join(''); }
        function closeAddModal() { document.getElementById("add-item-modal").classList.add("hidden"); }
        async function submitNewItem() {
            const name = document.getElementById("new-item-name").value.trim(); const cat = document.getElementById("new-item-cat").value; if(!name) return;
            const newItem = { id: "item_" + Date.now(), name: name, category: cat }; await saveToStore("workoutItems", newItem); state.workoutItems.push(newItem);
            closeAddModal(); document.getElementById("new-item-name").value = ""; renderCategoryList();
        }

        function switchTab(tab) {
            document.querySelectorAll(".tab-content").forEach(el => el.classList.add("hidden")); document.getElementById(`tab-${tab}`).classList.remove("hidden");
            document.querySelectorAll("nav button").forEach(btn => btn.className = "flex flex-col items-center gap-0.5 text-gray-400"); document.getElementById(`tab-btn-${tab}`).className = "flex flex-col items-center gap-0.5 text-blue-600";
            const titles = { workout: "🏋️ GymRec 開始訓練", history: "📈 GymRec 歷史總覽", settings: "⚙️ GymRec 系統設定" };
            document.getElementById("page-title").innerText = titles[tab]; document.getElementById("global-add-btn").style.display = tab === "workout" ? "block" : "none";
        }

        async function resetDatabase() {
            if(!confirm("確定要清除所有健身數據與分類嗎？此操作不可逆！")) return;
            if(!useLocalStorageFallback) { await clearStore("workoutItems"); await clearStore("historyRecords"); await clearStore("videos"); await clearStore("categories"); }
            localStorage.clear(); location.reload();
        }

        // --- 8. 智慧雙核 API 封裝 ---
        function getAllFromStore(storeName) {
            if (useLocalStorageFallback) return Promise.resolve(JSON.parse(localStorage.getItem(storeName)) || []);
            return new Promise((res, rej) => {
                try {
                    let tx = db.transaction(storeName, "readonly"); let store = tx.objectStore(storeName); let req = store.getAll();
                    req.onsuccess = () => res(req.result || []); req.onerror = () => rej(req.error);
                } catch(e) { activateFallbackMode(); res([]); }
            });
        }
        function saveToStore(storeName, obj) {
            if (useLocalStorageFallback) { return getAllFromStore(storeName).then(list => { list = list.filter(i => i.id !== obj.id); list.push(obj); localStorage.setItem(storeName, JSON.stringify(list)); }); }
            return new Promise((res) => {
                try {
                    let tx = db.transaction(storeName, "readwrite"); let store = tx.objectStore(storeName); store.put(obj); tx.oncomplete = () => res();
                } catch(e) { activateFallbackMode(); res(); }
            });
        }
        function addToStore(storeName, obj) {
            if (useLocalStorageFallback) { return getAllFromStore(storeName).then(list => { list.push(obj); localStorage.setItem(storeName, JSON.stringify(list)); }); }
            return new Promise((res) => {
                try {
                    let tx = db.transaction(storeName, "readwrite"); let store = tx.objectStore(storeName); store.add(obj); tx.oncomplete = () => res();
                } catch(e) { activateFallbackMode(); res(); }
            });
        }
        function getFromStore(storeName, id) {
            if (useLocalStorageFallback) { return getAllFromStore(storeName).then(list => list.find(i => i.id === id)); }
            return new Promise((res) => {
                try {
                    let tx = db.transaction(storeName, "readonly"); let store = tx.objectStore(storeName); let req = store.get(id); req.onsuccess = () => res(req.result);
                } catch(e) { activateFallbackMode(); res(null); }
            });
        }
        function deleteFromStore(storeName, id) {
            if (useLocalStorageFallback) { return getAllFromStore(storeName).then(list => { list = list.filter(i => i.id !== id); localStorage.setItem(storeName, JSON.stringify(list)); }); }
            return new Promise((res) => {
                try {
                    let tx = db.transaction(storeName, "readwrite"); let store = tx.objectStore(storeName); store.delete(id); tx.oncomplete = () => res();
                } catch(e) { activateFallbackMode(); res(); }
            });
        }
        function clearStore(storeName) {
            if (useLocalStorageFallback) { localStorage.removeItem(storeName); return Promise.resolve(); }
            return new Promise((res) => {
                try {
                    let tx = db.transaction(storeName, "readwrite"); let store = tx.objectStore(storeName); store.clear(); tx.oncomplete = () => res();
                } catch(e) { activateFallbackMode(); res(); }
            });
        }
    </script>
</body>
</html>
