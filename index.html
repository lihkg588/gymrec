<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GymRec 健身筆記</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .safe-bottom {
            padding-bottom: calc(env(safe-area-inset-bottom) + 4rem);
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-900 font-sans antialiased pb-20">

    <div class="bg-blue-600 text-white pt-12 pb-4 px-4 sticky top-0 z-50 shadow-md flex justify-between items-center">
        <h1 class="text-xl font-black tracking-wide" id="page-title">🏋️ GymRec 開始訓練</h1>
        <button id="global-add-btn" class="text-white focus:outline-none" onclick="openAddModal()">
            <i data-lucide="plus-circle" class="w-7 h-7"></i>
        </button>
    </div>

    <main class="p-4 safe-bottom">
        <div id="tab-workout" class="tab-content">
            <div id="category-list" class="space-y-4">
                <p class="text-center text-sm text-gray-400 py-8">正在初始化健身資料庫...</p>
            </div>
        </div>

        <div id="tab-history" class="tab-content hidden">
            <div class="bg-white p-4 rounded-2xl shadow-sm mb-4">
                <h3 class="font-bold text-sm text-gray-500 mb-2">📅 歷史訓練紀錄清單</h3>
                <div id="history-logs-container" class="space-y-3">
                    </div>
            </div>
        </div>

        <div id="tab-settings" class="tab-content hidden">
            <div class="bg-white p-4 rounded-2xl shadow-sm space-y-4">
                
                <div class="border-b pb-4">
                    <p class="font-bold text-blue-600 flex items-center gap-1">
                        <i data-lucide="refresh-cw" class="w-4 h-4"></i>從舊版 iOS App 遷移數據
                    </p>
                    <p class="text-xs text-gray-400 mt-1 mb-3">選擇你在 iPhone App 導出的 .gymrec 檔案，一鍵還原所有紀錄與影片</p>
                    <button onclick="triggerMigrationInput()" class="w-full bg-blue-50 text-blue-600 py-3 rounded-xl text-sm font-bold border border-blue-200 active:bg-blue-100">
                        選擇 .gymrec 備份檔案導入
                    </button>
                    <input type="file" id="migration-file-input" accept=".gymrec" class="hidden" onchange="handleIOSMigration(event)">
                </div>

                <div class="flex justify-between items-center border-b pb-2">
                    <div>
                        <p class="font-bold">本地數據清除</p>
                        <p class="text-xs text-gray-400">重置 App 到初始狀態</p>
                    </div>
                    <button onclick="resetDatabase()" class="bg-red-100 text-red-600 px-4 py-2 rounded-xl text-sm font-bold">清除重置</button>
                </div>
                <div class="text-xs text-gray-400 text-center pt-4">
                    GymRec Web PWA v1.2.0 · Safari 終極相容修正版
                </div>
            </div>
        </div>
    </main>

    <div id="detail-page" class="fixed inset-0 bg-gray-50 z-50 transform translate-x-full transition-transform duration-300 overflow-y-auto hidden">
        </div>

    <div id="record-modal" class="fixed inset-0 bg-black/50 z-50 flex items-end justify-center hidden">
        <div class="bg-white w-full max-w-md rounded-t-3xl p-6 space-y-4 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center">
                <h3 class="text-lg font-black" id="modal-title">填寫訓練紀錄</h3>
                <button onclick="closeRecordModal()" class="text-gray-400"><i data-lucide="x" class="w-6 h-6"></i></button>
            </div>
            <div class="space-y-2">
                <label class="text-xs font-bold text-gray-400">訓練日期</label>
                <input type="date" id="record-date" class="w-full bg-gray-100 p-3 rounded-xl border-0 focus:ring-2 focus:ring-blue-500">
            </div>
            <div class="space-y-2">
                <label class="text-xs font-bold text-gray-400">動作影片 (本地儲存)</label>
                <input type="file" id="record-video-input" accept="video/*" class="w-full text-sm text-gray-500">
            </div>
            <div class="space-y-3">
                <div class="flex justify-between items-center">
                    <label class="text-xs font-bold text-gray-400">組數紀錄 (點擊重量切換 N/A)</label>
                    <button onclick="addNewSetRow()" class="text-blue-600 text-xs font-bold flex items-center gap-1">
                        <i data-lucide="plus" class="w-3 h-3"></i>新增一組
                    </button>
                </div>
                <div id="sets-input-container" class="space-y-2">
                    </div>
            </div>
            <button onclick="saveRecordFromModal()" class="w-full bg-green-500 text-white py-4 rounded-xl font-bold shadow-lg shadow-green-200">儲存紀錄</button>
        </div>
    </div>

    <div id="add-item-modal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white w-full max-w-sm rounded-2xl p-6 space-y-4">
            <h3 class="text-lg font-black">新增訓練項目</h3>
            <input type="text" id="new-item-name" placeholder="輸入動作名稱 (如：槓鈴臥推)" class="w-full bg-gray-100 p-3 rounded-xl">
            <select id="new-item-cat" class="w-full bg-gray-100 p-3 rounded-xl">
                </select>
            <div class="flex gap-2">
                <button onclick="closeAddModal()" class="w-1/2 bg-gray-200 py-3 rounded-xl font-bold">取消</button>
                <button onclick="submitNewItem()" class="w-1/2 bg-blue-600 text-white py-3 rounded-xl font-bold">新增</button>
            </div>
        </div>
    </div>

    <div id="video-player-overlay" class="fixed inset-0 bg-black z-50 flex items-center justify-center hidden" onclick="closeFullScreenVideo()">
        <button class="absolute top-12 left-6 text-white/80 z-50"><i data-lucide="x-circle" class="w-8 h-8"></i></button>
        <video id="global-video-player" controls class="w-full max-h-screen"></video>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t border-gray-200 flex justify-around py-2 shadow-lg z-40">
        <button onclick="switchTab('workout')" id="tab-btn-workout" class="flex flex-col items-center gap-0.5 text-blue-600">
            <i data-lucide="dumbbell" class="w-6 h-6"></i><span class="text-[10px] font-bold">開始訓練</span>
        </button>
        <button onclick="switchTab('history
